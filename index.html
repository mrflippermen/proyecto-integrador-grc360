<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="CyberRisk 360 — Sistema de gestión de riesgos cibernéticos (metodología GRC-360).">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
<title>CyberRisk 360 — Gestión de Riesgos Cibernéticos</title>
<style>
/* CyberRisk 360 — Consola de Operaciones de Riesgo (tema oscuro deliberado) */
:root{
  --bg:#0e131f; --bg-2:#121a29; --surface:#182233; --surface-2:#1e2a3e;
  --border:#29354b; --border-soft:#212c40;
  --text:#e8edf5; --muted:#93a1b8; --dim:#64748b;
  --brand:#4c82f7; --brand-2:#34d3c0; --glow:rgba(76,130,247,.35);
  --bajo:#2e9e5b; --medio:#e0a800; --alto:#e8590c; --critico:#d63a3a;
  --radius:12px; --radius-sm:8px;
  --fs-display:ui-sans-serif,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --fs-body:ui-sans-serif,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --fs-mono:ui-monospace,"SF Mono","Cascadia Code","Roboto Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--fs-body);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--brand);text-decoration:none}
a:hover{text-decoration:underline}
h1,h2,h3,h4{font-family:var(--fs-display);margin:0;letter-spacing:-.02em;font-weight:700}
.mono{font-family:var(--fs-mono);font-variant-numeric:tabular-nums}
.muted{color:var(--muted)} .dim{color:var(--dim)} .center{text-align:center} .right{text-align:right}
button{font-family:inherit}
:focus-visible{outline:2px solid var(--brand);outline-offset:2px}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:250px;flex-shrink:0;background:linear-gradient(180deg,var(--bg-2),var(--bg));border-right:1px solid var(--border-soft);padding:20px 14px;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:60px;flex-shrink:0;border-bottom:1px solid var(--border-soft);background:rgba(14,19,31,.85);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:30}
.content{padding:26px 32px 70px;max-width:1280px;width:100%;margin:0 auto}

/* Brand */
.brand{display:flex;align-items:center;gap:11px;margin-bottom:22px;padding:0 6px;cursor:pointer}
.brand-mark{width:38px;height:38px;border-radius:10px;flex-shrink:0;background:conic-gradient(from 140deg,var(--bajo),var(--medio),var(--alto),var(--critico),var(--bajo));display:grid;place-items:center;box-shadow:0 0 0 1px rgba(255,255,255,.06),0 6px 18px rgba(0,0,0,.4)}
.brand-mark span{width:14px;height:14px;border-radius:4px;background:var(--bg)}
.brand-name{font-family:var(--fs-display);font-weight:800;font-size:1.05rem;line-height:1}
.brand-name small{display:block;font-weight:600;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-top:4px}

/* Nav */
.nav-label{font-size:.66rem;text-transform:uppercase;letter-spacing:.16em;color:var(--dim);margin:16px 8px 7px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:var(--radius-sm);color:var(--muted);font-size:.9rem;font-weight:500;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .15s,color .15s}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:var(--surface-2);color:var(--text);box-shadow:inset 2px 0 0 var(--brand)}
.nav-item.active .phase-num{background:var(--brand);color:#fff;border-color:transparent}
.phase-num{font-family:var(--fs-mono);font-size:.72rem;font-weight:600;width:22px;height:22px;flex-shrink:0;display:grid;place-items:center;border:1px solid var(--border);border-radius:6px;color:var(--dim)}
.ico{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}

/* Page head */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.eyebrow{font-size:.68rem;text-transform:uppercase;letter-spacing:.16em;color:var(--brand-2);font-weight:700;margin-bottom:8px}
.page-head h1{font-size:1.65rem;text-wrap:balance}
.page-head p{color:var(--muted);margin:6px 0 0;max-width:660px;font-size:.92rem}

/* Cards & grid */
.card{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);padding:20px}
.card + .card{margin-top:18px}
.card-title{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:4px;font-family:var(--fs-display)}
.card-sub{color:var(--muted);font-size:.82rem;margin-bottom:16px}
.grid{display:grid;gap:18px}
.g4{grid-template-columns:repeat(4,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:repeat(2,1fr)}
.mt{margin-top:18px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.between{justify-content:space-between}
.stack{display:flex;flex-direction:column;gap:4px}
.divider{height:1px;background:var(--border-soft);margin:20px 0;border:none}

/* KPI */
.kpi{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:var(--brand);opacity:.8}
.kpi.g::after{background:var(--bajo)} .kpi.r::after{background:var(--critico)} .kpi.a::after{background:var(--alto)}
.k-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:600}
.k-value{font-family:var(--fs-display);font-size:2.05rem;font-weight:800;line-height:1.1;margin-top:6px;font-variant-numeric:tabular-nums}
.k-foot{font-size:.77rem;color:var(--dim);margin-top:4px}

/* Chips / tags */
.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--fs-mono);font-size:.73rem;font-weight:600;padding:3px 9px;border-radius:999px;white-space:nowrap}
.chip::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}
.chip.bajo{color:var(--bajo);background:rgba(46,158,91,.15)}
.chip.medio{color:var(--medio);background:rgba(224,168,0,.15)}
.chip.alto{color:var(--alto);background:rgba(232,89,12,.15)}
.chip.critico{color:var(--critico);background:rgba(214,58,58,.16)}
.tag{display:inline-block;font-size:.72rem;font-weight:600;padding:3px 9px;border-radius:6px;background:var(--surface-2);color:var(--muted);border:1px solid var(--border-soft)}
.tag.brand{color:var(--brand);background:rgba(76,130,247,.12);border-color:rgba(76,130,247,.25)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:.875rem;font-weight:600;padding:9px 15px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-2);color:var(--text);transition:transform .1s,background .15s}
.btn:hover{background:var(--surface);text-decoration:none}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--brand);border-color:transparent;color:#fff;box-shadow:0 4px 16px var(--glow)}
.btn.primary:hover{background:#3d72e8}
.btn.danger{background:transparent;border-color:rgba(214,58,58,.4);color:var(--critico)}
.btn.danger:hover{background:rgba(214,58,58,.16)}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 11px;font-size:.8rem}

/* Tables */
.table-wrap{overflow-x:auto;border:1px solid var(--border-soft);border-radius:var(--radius)}
table.data{width:100%;border-collapse:collapse;font-size:.875rem}
table.data thead th{text-align:left;font-size:.69rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:600;padding:12px 14px;background:var(--bg-2);border-bottom:1px solid var(--border-soft);white-space:nowrap}
table.data tbody td{padding:11px 14px;border-bottom:1px solid var(--border-soft);vertical-align:middle}
table.data tbody tr:last-child td{border-bottom:none}
table.data tbody tr.clickable{cursor:pointer}
table.data tbody tr.clickable:hover{background:var(--surface)}
.code{font-family:var(--fs-mono);font-size:.82rem;color:var(--brand-2)}

/* Forms */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:.8rem;font-weight:600;color:var(--muted)}
.req{color:var(--critico)}
.hint{font-size:.74rem;color:var(--dim)}
.control{width:100%;padding:10px 12px;font-size:.9rem;font-family:inherit;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text)}
.control:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--glow)}
textarea.control{resize:vertical;min-height:78px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 18px}
.form-grid .full{grid-column:1/-1}
.scale{display:flex;gap:6px}
.scale button{flex:1;padding:8px 0;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-2);cursor:pointer;font-family:var(--fs-mono);font-weight:600;font-size:.9rem;color:var(--muted)}
.scale button.on{background:var(--brand);border-color:transparent;color:#fff}

/* Bars */
.bar-row{display:grid;grid-template-columns:110px 1fr 44px;align-items:center;gap:12px;margin-bottom:9px}
.bar-track{height:10px;background:var(--bg-2);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;border-radius:999px}
.bar-label{font-size:.82rem;color:var(--muted)}
.bar-val{font-family:var(--fs-mono);font-size:.82rem;text-align:right}

/* Matrix */
.matrix{display:grid;grid-template-columns:auto repeat(5,1fr);gap:5px}
.matrix .axis{writing-mode:vertical-rl;transform:rotate(180deg);text-align:center;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);grid-row:1/span 5;display:grid;place-items:center}
.matrix .cell{aspect-ratio:1/1;border-radius:8px;display:grid;place-items:center;font-family:var(--fs-mono);font-weight:700;font-size:1.05rem;border:1px solid rgba(255,255,255,.05)}
.matrix .cell.empty{color:rgba(255,255,255,.22)}
.matrix .hx{text-align:center;font-family:var(--fs-mono);font-size:.78rem;color:var(--muted);padding-top:6px}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;font-size:.78rem;color:var(--muted)}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:12px;height:12px;border-radius:3px;display:inline-block}

/* Donut ring */
.ring{border-radius:50%;display:grid;place-items:center;flex-shrink:0}
.ring>div{border-radius:50%;background:var(--surface);display:grid;place-items:center;text-align:center}

/* Lists */
.obs{padding:13px 0;border-bottom:1px solid var(--border-soft)}
.obs:last-child{border-bottom:none}
.obs-meta{display:flex;align-items:center;gap:10px;font-size:.76rem;color:var(--dim);margin-bottom:5px}
.empty{text-align:center;padding:42px 20px;color:var(--dim)}
.empty h3{color:var(--muted);margin-bottom:8px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(6,9,15,.72);backdrop-filter:blur(3px);display:grid;place-items:center;z-index:100;padding:20px;overflow:auto}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;max-width:760px;width:100%;padding:26px;box-shadow:0 30px 80px rgba(0,0,0,.5);margin:auto}
.modal.wide{max-width:920px}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}
.x{background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;line-height:1;padding:2px 6px;border-radius:6px}
.x:hover{background:var(--surface-2);color:var(--text)}

/* Toast */
.toasts{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--brand);border-radius:10px;padding:12px 16px;font-size:.86rem;max-width:340px;box-shadow:0 12px 40px rgba(0,0,0,.4);animation:slidein .25s ease}
.toast.ok{border-left-color:var(--bajo)} .toast.warn{border-left-color:var(--medio)} .toast.err{border-left-color:var(--critico)}
@keyframes slidein{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}

/* Banner */
.banner{background:linear-gradient(100deg,rgba(76,130,247,.12),rgba(52,211,192,.08));border:1px solid rgba(76,130,247,.25);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;gap:16px;margin-bottom:22px}
.banner .b-ico{width:42px;height:42px;border-radius:11px;background:rgba(76,130,247,.16);display:grid;place-items:center;flex-shrink:0}

/* Dropzone */
.drop{border:2px dashed var(--border);border-radius:var(--radius);padding:38px 24px;text-align:center;background:var(--bg-2);transition:border-color .15s,background .15s;cursor:pointer}
.drop.hover{border-color:var(--brand);background:rgba(76,130,247,.06)}
.drop svg{margin-bottom:12px}

/* Steps */
.steps{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.step{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--muted)}
.step b{width:22px;height:22px;border-radius:50%;background:var(--surface-2);display:grid;place-items:center;font-size:.75rem;font-family:var(--fs-mono);color:var(--brand)}

/* Tooltip */
.tip{position:relative;cursor:help;border-bottom:1px dotted var(--dim)}
.tip:hover::after{content:attr(data-tip);position:absolute;bottom:130%;left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--border);color:var(--text);font-size:.76rem;font-weight:400;padding:8px 11px;border-radius:8px;width:230px;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.4);line-height:1.4}

.hide-mobile{}
.menu-btn{display:none;background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;cursor:pointer}

@media(max-width:1024px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr}}
@media(max-width:860px){
  .sidebar{position:fixed;z-index:120;transform:translateX(-100%);transition:transform .2s;box-shadow:0 0 60px rgba(0,0,0,.6)}
  .sidebar.open{transform:none}
  .menu-btn{display:inline-flex}
  .content{padding:20px 16px 60px}
  .form-grid,.g2{grid-template-columns:1fr}
}

</style>

}
function cesNivel(s){ if(s<200)return{n:'Bajo',c:'bajo'}; if(s<450)return{n:'Medio',c:'medio'}; if(s<700)return{n:'Alto',c:'alto'}; return{n:'Crítico',c:'critico'}; }

// ===================== Motor de valoración y mitigación automática =====================
function ctrlByIso(iso){ return state.controles.filter(function(c){return c.codigo_iso===iso;})[0]; }
function cvssToImpacto(s){ if(s==null)return 0; if(s<2)return 1; if(s<4)return 2; if(s<7)return 3; if(s<9)return 4; return 5; }

// Sugerencia automática de Probabilidad e Impacto a partir del activo (criticidad
// CIA) y de la inteligencia de la vulnerabilidad (CVSS, EPSS, CISA KEV).
function sugerirValoracion(a,t,v){
  var impAsset=a?assetValor(a):3;
  var impCvss=v?cvssToImpacto(v.cvss_score):0;
  var i=Math.max(impAsset,impCvss)||3;
  var p;
  if(v&&v.kev){ p=5; }
  else if(v&&v.epss_score!=null){ var e=v.epss_score; p=e<.05?2:e<.2?3:e<.5?4:5; }
  else { p=3; }
  var motivo=[];
  motivo.push('Impacto '+i+' = máx(valor del activo '+impAsset+(impCvss?', CVSS '+impCvss:'')+')');
  if(v&&v.kev) motivo.push('Probabilidad 5 (explotación activa · CISA KEV)');
  else if(v&&v.epss_score!=null) motivo.push('Probabilidad '+p+' (EPSS '+epssPct(v)+'%)');
  else motivo.push('Probabilidad '+p+' (valor por defecto, sin inteligencia de la vulnerabilidad)');
  return {p:p,i:i,motivo:motivo.join(' · ')};
}

// Reglas de mitigación: vulnerabilidad/categoría/amenaza -> controles ISO 27002
// recomendados con su eficacia estimada.
var MITIG_VULN={
  'Ausencia de MFA':[['8.5',80]],
  'Software sin parches':[['8.8',60],['8.7',40]],
  'Contraseñas débiles':[['8.5',70],['8.3',40]],
  'Falta de cifrado':[['8.24',70],['8.12',40]],
  'Sin respaldos verificados':[['8.13',70]],
  'Personal sin capacitación':[['6.3',55]],
  'Validación de entrada deficiente':[['8.28',75],['8.8',50]],
  'Reglas de firewall permisivas':[['8.20',60]],
  'Privilegios excesivos':[['8.2',60],['8.3',40]],
  'Logs no monitoreados':[['8.16',60],['8.15',40]],
  'Log4Shell (Apache Log4j2 RCE)':[['8.8',60],['8.28',50]],
  'EternalBlue (SMBv1 RCE)':[['8.8',60],['8.20',50]]
};
var MITIG_CAT={ 'Autenticación':[['8.5',70]],'Criptografía':[['8.24',70]],'Red':[['8.20',60]],'Desarrollo':[['8.28',70]],'Gestión de parches':[['8.8',60]],'Continuidad':[['8.13',70]],'Concienciación':[['6.3',55]],'Control de acceso':[['8.2',60]],'Monitoreo':[['8.16',60]] };
var MITIG_THREAT={ 'Ransomware':[['8.13',60]],'Phishing / Ingeniería social':[['6.3',55]],'Denegación de servicio (DDoS)':[['8.20',55]] };

function recomendarControles(r){
  var v=V[r.vuln_id], t=T[r.threat_id];
  var base=(v&&MITIG_VULN[v.nombre]) || (v&&MITIG_CAT[v.categoria]) || [['8.8',50]];
  var extra=(t&&MITIG_THREAT[t.nombre]) || [];
  var seen={}, out=[];
  base.concat(extra).forEach(function(pair){ var iso=pair[0],efi=pair[1],c=ctrlByIso(iso);
    if(!c||seen[iso])return; seen[iso]=1;
    out.push({control_id:c.id,codigo_iso:iso,nombre:c.nombre,eficacia:efi,estrategia:'Mitigar',
      descripcion:'Control recomendado automáticamente'+(v?' para '+v.nombre.toLowerCase():'')+'.'});
  });
  return out;
}
function residualProyectado(r,recs){
  var f=1;
  recs.forEach(function(x){ f*=(1-x.eficacia/100); });
  tratsDe(r).forEach(function(t){ if(t.estrategia==='Aceptar'||t.estrategia==='Evitar')return; if(t.estado!=='Implementado'&&t.estado!=='Verificado')return; f*=(1-(t.eficacia||0)/100); });
  return Math.max(1, Math.round(inh(r)*(1-Math.min(.9,1-f))));
}
window.applyAuto=function(rid){ var r=state.riesgos.filter(function(x){return x.id===rid;})[0]; if(!r)return;
  var recs=recomendarControles(r); if(!recs.length){ toast('No hay controles recomendados para este riesgo.','warn'); return; }
  recs.forEach(function(x){ state.tratamientos.push({risk_id:rid,control_id:x.control_id,estrategia:'Mitigar',descripcion:x.descripcion,responsable:'Asignación automática',eficacia:x.eficacia,estado:'Implementado'}); });

};

// ---------- CUMPLIMIENTO ----------

// ---------- RIESGO RESIDUAL (Fase 4) ----------
VIEWS.residual=function(){

  var si=rs.reduce(function(a,r){return a+inh(r);},0)||1, sr=rs.reduce(function(a,r){return a+res(r);},0);
  var reduc=Math.round((si-sr)/si*100);

  var di={Bajo:0,Medio:0,Alto:0,'Crítico':0}, dr={Bajo:0,Medio:0,Alto:0,'Crítico':0};
  rs.forEach(function(r){ di[nivel(inh(r)).n]++; dr[nivel(res(r)).n]++; });
  var html=head('Fase 4 — Cálculo de riesgo residual','Riesgo residual',
    'Riesgo remanente tras aplicar los controles. Se recalcula automáticamente: Residual = Inherente × (1 − eficacia combinada). Solo los controles Implementados o Verificados reducen el riesgo; la reducción máxima es del 90 %.');
  html+='<div class="grid g4">'
    +kpi('a','Exposición inherente',si,'Suma de P×I sin controles')
    +kpi('g','Exposición residual',sr,'Tras los controles aplicados')
    +kpi('g','Reducción global',reduc+'%','Efecto agregado del tratamiento')
    +kpi(sobre.length?'r':'','Exceden el apetito',sobre.length,'Residual > '+apet+' (umbral ISO 31000)')
  +'</div>';
  html+='<div class="card mt" style="background:var(--bg-2);padding:14px 18px"><div class="dim" style="font-size:.82rem"><b>Metodología:</b> la eficacia combinada de n controles = 1 − Π(1 − eficaciaᵢ). La estrategia <b>Evitar</b> elimina el riesgo (residual mínimo); <b>Aceptar</b> no reduce el valor. El residual nunca baja de 1.</div></div>';
  html+='<div class="card mt"><div class="card-title">Inherente vs. residual por nivel</div><div class="card-sub">Migración de riesgos entre niveles gracias al tratamiento.</div>';
  html+='<div class="dim" style="font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;margin:8px 0 10px">Inherente</div>';
  ['Crítico','Alto','Medio','Bajo'].forEach(function(n){ html+=bar(n,di[n],rs.length,nivel(n==='Crítico'?20:n==='Alto'?12:n==='Medio'?7:2).col); });
  html+='<hr class="divider" style="margin:16px 0"><div class="dim" style="font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">Residual <span class="chip bajo" style="margin-left:6px">−'+reduc+'%</span></div>';
  ['Crítico','Alto','Medio','Bajo'].forEach(function(n){ html+=bar(n,dr[n],rs.length,nivel(n==='Crítico'?20:n==='Alto'?12:n==='Medio'?7:2).col); });

  rs.forEach(function(r){ var ef=Math.round(eficacia(r)*100), over=res(r)>apet;
    html+='<tr class="clickable" onclick="openRisk('+r.id+')"><td><span class="code">'+h(r.codigo)+'</span></td><td>'+h(A[r.asset_id].nombre)+'</td><td>'+chip(nivel(inh(r)),inh(r)+' ('+r.probabilidad+'×'+r.impacto+')')+'</td><td class="mono">'+ef+'%</td><td>'+chip(nivel(res(r)),res(r)+' · '+nivel(res(r)).n)+'</td><td class="mono'+(reduccion(r)>0?'':' dim')+'">'+(reduccion(r)>0?'−'+reduccion(r)+'%':'—')+'</td><td>'+(over?'<span class="chip critico">Excede</span>':'<span class="chip bajo">Dentro</span>')+'</td></tr>'; });

  state.activos.push({id:nextId(),codigo:d.codigo.toUpperCase(),nombre:d.nombre,descripcion:d.descripcion||'',tipo:d.tipo||'Información',propietario:d.propietario||'',c:+d.c||3,i:+d.i||3,d:+d.d||3});

window.updateInhPreview=function(){ var el2=el('inhPrevVal'); if(!el2)return; var p=getHidden('probabilidad'),i=getHidden('impacto'),s=p*i,nv=nivel(s); el2.innerHTML='<span class="chip '+nv.c+'">'+s+' · '+nv.n+'</span> <span class="dim mono" style="font-size:.82rem">(P'+p+' × I'+i+')</span>'; };

  state.tratamientos.push({risk_id:rid,control_id:d.control_id?+d.control_id:null,estrategia:d.estrategia,descripcion:d.descripcion||'',responsable:d.responsable||'',eficacia:d.estrategia==='Aceptar'?0:ef,estado:d.estado||'Propuesto'});

// ===================== Enriquecimiento (demo local) =====================
window.enrich=function(id){ var v=state.vulnerabilidades.filter(function(x){return x.id===id;})[0]; var cve=(el('cve'+id).value||'').trim().toUpperCase();
  if(!/^CVE-\d{4}-\d{4,7}$/.test(cve)){ toast('Formato inválido. Use CVE-AAAA-NNNN.','err'); return; }
  var d=CVE_DB[cve];
  v.cve_id=cve;
  if(d){ v.cvss_score=d.cvss; v.cvss_vector=d.vec; v.epss_score=d.epss; v.kev=d.kev; v.kev_fecha=d.kevf; if(d.desc) v.descripcion=d.desc;
    saveState(); toast(cve+' enriquecido — CVSS '+d.cvss+' · EPSS '+Math.round(d.epss*1000)/10+'% · '+(d.kev?'KEV ✔':'no-KEV')+' · VPR '+vpr(v),'ok');
  } else { saveState(); toast(cve+' registrado. No está en el catálogo local de demostración (la versión completa lo consulta en NVD/EPSS/CISA en vivo).','warn'); }

// ===================== Importación Excel/CSV =====================
var COLS={ activos:['codigo','nombre','tipo','propietario','confidencialidad','integridad','disponibilidad','descripcion'],
           riesgos:['codigo','activo_codigo','amenaza','vulnerabilidad','probabilidad','impacto','estado','descripcion'] };
var SAMPLE={ activos:[['ACT-101','Servidor de aplicaciones','Hardware','Administrador TI',4,4,5,'Servidor productivo principal']],
             riesgos:[['R-101','ACT-101','Ransomware','Software sin parches',4,5,'Identificado','Cifrado malicioso del servidor']] };

function bindDrop(kind){ var dz=el('dz-'+kind), inp=el('f-'+kind); if(!dz)return;
  dz.onclick=function(){inp.click();};
  dz.ondragover=function(e){e.preventDefault();dz.classList.add('hover');};
  dz.ondragleave=function(){dz.classList.remove('hover');};
  dz.ondrop=function(e){e.preventDefault();dz.classList.remove('hover');if(e.dataTransfer.files[0])readFile(e.dataTransfer.files[0],kind);};
  inp.onchange=function(){if(inp.files[0])readFile(inp.files[0],kind);};
}
function readFile(file,kind){ var fr=new FileReader(); var isCsv=/\.csv$/i.test(file.name);
  fr.onload=function(e){ try{ var wb=isCsv?XLSX.read(e.target.result,{type:'string'}):XLSX.read(new Uint8Array(e.target.result),{type:'array'});
    var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''}); preview(kind,rows);
  }catch(err){ toast('No se pudo leer el archivo: '+err.message,'err'); } };
  if(isCsv) fr.readAsText(file); else fr.readAsArrayBuffer(file);
}
function preview(kind,rows){ if(!rows.length){ toast('El archivo no contiene filas.','warn'); return; }
  var valid=[],errs=0;
  rows.forEach(function(row){ var r=normalizeRow(kind,row); if(r.__err) errs++; else valid.push(r); });
  var html='<div class="card mt"><div class="row between"><div class="card-title">Vista previa — '+kind+'</div><div class="row"><span class="dim" style="font-size:.82rem">'+valid.length+' válidas'+(errs?' · '+errs+' con error':'')+'</span><button class="btn sm primary" onclick="applyImport(\''+kind+'\')">Importar '+valid.length+' filas</button></div></div>';
  html+='<div class="table-wrap"><table class="data"><thead><tr>'+COLS[kind].map(function(c){return '<th>'+c+'</th>';}).join('')+'<th></th></tr></thead><tbody>';
  rows.slice(0,50).forEach(function(row){ var r=normalizeRow(kind,row); html+='<tr>'+COLS[kind].map(function(c){return '<td>'+h(row[c]!=null?row[c]:'')+'</td>';}).join('')+'<td>'+(r.__err?'<span class="chip critico">'+h(r.__err)+'</span>':'<span class="chip bajo">OK</span>')+'</td></tr>'; });
  html+='</tbody></table></div>'+(rows.length>50?'<div class="dim" style="font-size:.78rem;margin-top:8px">Mostrando 50 de '+rows.length+' filas.</div>':'')+'</div>';
  el('preview').innerHTML=html; window.__pending={kind:kind,rows:valid}; el('preview').scrollIntoView({behavior:'smooth'});
}
function normalizeRow(kind,row){
  var g=function(k){ return row[k]!=null?String(row[k]).trim():''; };
  if(kind==='activos'){ var codigo=g('codigo').toUpperCase(),nombre=g('nombre');
    if(!codigo||nombre.length<3) return {__err:'código/nombre'};
    var c=+g('confidencialidad')||3,i=+g('integridad')||3,d=+g('disponibilidad')||3;
    if([c,i,d].some(function(x){return x<1||x>5;})) return {__err:'CIA 1–5'};
    return {codigo:codigo,nombre:nombre,tipo:g('tipo')||'Información',propietario:g('propietario'),c:c,i:i,d:d,descripcion:g('descripcion')};
  } else { var cod=g('codigo').toUpperCase(),ac=g('activo_codigo').toUpperCase();
    if(!cod||!ac) return {__err:'código/activo'};
    var p=+g('probabilidad')||3,im=+g('impacto')||3;
    if(p<1||p>5||im<1||im>5) return {__err:'P/I 1–5'};
    var a=state.activos.filter(function(x){return x.codigo.toUpperCase()===ac;})[0];
    if(!a) return {__err:'activo inexistente'};
    return {codigo:cod,activo_codigo:ac,amenaza:g('amenaza'),vulnerabilidad:g('vulnerabilidad'),probabilidad:p,impacto:im,estado:g('estado')||'Identificado',descripcion:g('descripcion')};
  }
}
window.applyImport=function(kind){ var p=window.__pending; if(!p||p.kind!==kind){ return; } var added=0,skip=0;
  if(kind==='activos'){ p.rows.forEach(function(r){ if(state.activos.some(function(a){return a.codigo.toUpperCase()===r.codigo;})){skip++;return;} state.activos.push({id:nextId(),codigo:r.codigo,nombre:r.nombre,descripcion:r.descripcion,tipo:r.tipo,propietario:r.propietario,c:r.c,i:r.i,d:r.d}); added++; }); }
  else { p.rows.forEach(function(r){ if(state.riesgos.some(function(x){return x.codigo.toUpperCase()===r.codigo;})){skip++;return;}
    var a=state.activos.filter(function(x){return x.codigo.toUpperCase()===r.activo_codigo;})[0]; if(!a){skip++;return;}
    var t=state.amenazas.filter(function(x){return x.nombre.toLowerCase()===r.amenaza.toLowerCase();})[0]; if(!t&&r.amenaza){t={id:nextId(),nombre:r.amenaza,categoria:'Importada',descripcion:'',attack_id:null,attack_tactica:null};state.amenazas.push(t);}
    var v=state.vulnerabilidades.filter(function(x){return x.nombre.toLowerCase()===r.vulnerabilidad.toLowerCase();})[0]; if(!v&&r.vulnerabilidad){v={id:nextId(),nombre:r.vulnerabilidad,categoria:'Importada',descripcion:'',cve_id:null,cvss_score:null,cvss_vector:null,epss_score:null,epss_percentile:null,kev:false,kev_fecha:null};state.vulnerabilidades.push(v);}
    if(!t||!v){skip++;return;}
    state.riesgos.push({id:nextId(),codigo:r.codigo,asset_id:a.id,threat_id:t.id,vuln_id:v.id,descripcion:r.descripcion,controles_existentes:'',probabilidad:r.probabilidad,impacto:r.impacto,estado:r.estado,dias_edad:0}); added++;
  }); }
  saveState(); reindex(); el('preview').innerHTML=''; window.__pending=null;
  toast(added+' '+kind+' importados'+(skip?' · '+skip+' omitidos':'')+'.','ok');
  go(kind);
};
